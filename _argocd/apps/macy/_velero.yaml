apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
spec:
  project: macy
  source:
    repoURL: https://github.com/klaernie/k8s-macy.git
    path: _velero
    targetRevision: main
  destination:
    server: https://macy.ak-online.be:6443
    namespace: velero
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      enabled: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
