apiVersion: v1
kind: ConfigMap
metadata:
  name: netbox-oidc
  namespace: netbox
data:
  netbox-oidc.yaml: |
    LOGIN_FORM_HIDDEN: 'true'
    REMOTE_AUTH_BACKEND: social_core.backends.open_id_connect.OpenIdConnectAuth
    SOCIAL_AUTH_BACKEND_ATTRS:
      oidc:
        - Keycloak
        - login
    SOCIAL_AUTH_OIDC_OIDC_ENDPOINT: 'https://keycloak.ak-online.be/realms/master'
    SOCIAL_AUTH_OIDC_KEY: netbox
    SOCIAL_AUTH_SUPERUSER_ROLE: admin
    LOGLEVEL: DEBUG
    SOCIAL_AUTH_PIPELINE:
      - "social_core.pipeline.social_auth.social_details"
      - "social_core.pipeline.social_auth.social_uid"
      - "social_core.pipeline.social_auth.social_user"
      - "social_core.pipeline.user.get_username"
      - "social_core.pipeline.social_auth.associate_by_email"
      - "social_core.pipeline.user.create_user"
      - "social_core.pipeline.social_auth.associate_user"
      - "netbox.authentication.user_default_groups_handler"
      - "social_core.pipeline.social_auth.load_extra_data"
      - "social_core.pipeline.user.user_details"
      - "netbox.sso_pipeline_roles.set_role"
  sso_pipeline_roles.py: |
    from django.conf import settings
    from netbox.authentication import Group

    def set_role(response, user, backend, *args, **kwargs):
      client_id = getattr(settings, 'SOCIAL_AUTH_OIDC_KEY', None)
      staff_role = getattr(settings, 'SOCIAL_AUTH_STAFF_ROLE', 'staff')
      superuser_role = getattr(settings, 'SOCIAL_AUTH_SUPERUSER_ROLE', 'superuser')
      roles = []
      try:
        roles = response['resource_access'][client_id]['roles']
      except KeyError:
        pass
      user.is_staff = (staff_role in roles)
      user.is_superuser = (superuser_role in roles)
      user.save()
      groups = Group.objects.all()
      for group in groups:
        try:
          if group.name in roles:
            group.users.add(user)
          else:
            group.users.remove(user)
        except Group.DoesNotExist:
          continue
