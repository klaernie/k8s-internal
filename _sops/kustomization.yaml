resources:
  - 00_ns.yaml
  # why store the age-key inside a SopsSecret, that cannot be decrypted without the key?
  # Because I can manually decrypt it and apply it, bootstrapping the system
  - secrets.enc.yaml

helmCharts:
  - name: sops-secrets-operator
    repo: https://isindir.github.io/sops-secrets-operator/
    releaseName: sops
    namespace: sops
    version: 0.28.0
    includeCRDs: true
    valuesInline:
      securityContext:
        enabled: true
      extraEnv:
        - name: SOPS_AGE_KEY_FILE
          value: /etc/sops-age-key-file/key.txt
      secretsAsFiles:
        - mountPath: /etc/sops-age-key-file
          name: sops-age-key-file
          secretName: age-key

namespace: sops
