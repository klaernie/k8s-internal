apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-gatus
  namespace: gatus
spec:
  instances: 1

  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql-minimal-trixie
    major: 18

  bootstrap:
    recovery:
      source: origin

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: rustfs

  resources:
    requests:
      memory: 3Gi
      cpu: 3
    limits:
      memory: 3Gi
      cpu: 3

  storage:
    pvcTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 2Gi
      storageClassName: zfs-quick

  managed:
    services:
      disabledDefaultServices: ["ro", "r"]

  externalClusters:
    - name: origin
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: rustfs
          serverName: pg-gatus
